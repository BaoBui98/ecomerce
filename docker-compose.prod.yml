version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ecommerce_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_backend_prod
    restart: always
    environment:
      - PORT=5050
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES_IN=1d
      - JWT_REFRESH_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
    depends_on:
      - postgres
      - redis
    ports:
      - "5050:5050"

  kong:
    image: kong:3.6
    container_name: ecommerce_kong_prod
    restart: always
    depends_on:
      - postgres
      - backend
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: ${DB_USERNAME}
      KONG_PG_PASSWORD: ${DB_PASSWORD}
      KONG_PG_DATABASE: ${DB_DATABASE}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
    ports:
      - "80:8000"   # Proxy HTTP traffic
      - "443:8443"  # Proxy HTTPS traffic
      - "8001:8001" # Admin API
      - "8002:8002" # Manager UI
    command: >
      bash -c "
      kong migrations bootstrap &&
      kong start
      "

volumes:
  postgres_data_prod:
  redis_data_prod:
